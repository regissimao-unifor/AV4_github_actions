name: Backend Tests

on:
  push:
    paths:
      - 'supabase_backend/**'
      - '.github/workflows/backend-tests.yml'
  workflow_dispatch:

jobs:
  cypress-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase_backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: supabase_backend/package-lock.json

      - name: Run Cypress (mocked Supabase)
        uses: cypress-io/github-action@v6
        with:
          working-directory: supabase_backend
          start: npm run test:server
          wait-on: 'http://localhost:3001'
          wait-on-timeout: 60
