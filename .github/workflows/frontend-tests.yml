name: Frontend Tests

on:
  push:
    paths:
      - 'supabase_frontend/**'
      - '.github/workflows/frontend-tests.yml'
  workflow_dispatch:

jobs:
  cypress-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: supabase_frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: supabase_frontend/package-lock.json

      - name: Run Cypress (mocked API)
        uses: cypress-io/github-action@v6
        with:
          working-directory: supabase_frontend
          start: npm start
          wait-on: 'http://localhost:8080'
          wait-on-timeout: 60
